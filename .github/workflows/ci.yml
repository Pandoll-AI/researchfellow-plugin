name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Dev deps are enough for the stdlib-first suite; the runtime stats stack
      # is installed too so the real-data model-fit test actually runs (not skipped).
      - name: Install dependencies
        run: pip install -r requirements-dev.txt -r requirements.txt
      - name: Run trust-foundation suite
        run: python -m pytest tests/ -v
